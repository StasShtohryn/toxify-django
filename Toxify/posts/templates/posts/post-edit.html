{% extends 'main/base.html' %}

{% block title %} Editing Post {% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mb-4">
    <a href="{% url 'post_detail' post.id %}" class="inline-flex items-center gap-2 text-white/40 hover:text-white transition-colors group">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-hover:-translate-x-1">
            <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
        </svg>
        <span class="text-xs font-bold uppercase tracking-wider">Back to post</span>
    </a>
</div>

<div class="max-w-2xl mx-auto p-6 bg-black border border-white/10">
    <h1 class="text-xl font-bold mb-6 italic uppercase tracking-tighter">Edit Post</h1>

    <form method="post" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}

        <div>
            <label class="block text-xs text-white/40 mb-1">TITLE</label>
            {{ form.title }}
        </div>

        <div>
            <label class="block text-xs text-white/40 mb-1">CONTENT</label>
            {{ form.body }}
        </div>

        <div>
            <label class="block text-xs text-white/40 mb-1">HASHTAGS (comma separated)</label>
            <input type="text" name="hashtags_input" value="{{ current_tags }}" placeholder="toxic, drama, life"
                   class="w-full bg-transparent border border-white/20 p-2 text-sm focus:outline-none focus:border-white text-white">
        </div>

        {% if post.image %}
        <div class="mt-2">
            <label class="text-xs text-white/40 block mb-1 uppercase">Current Image</label>
            <img src="{{ post.image.url }}" class="w-32 h-32 object-cover border border-white/10 mb-2">
        </div>
        {% endif %}

        <div class="mt-2 border-t border-white/5 pt-2">
            <label class="text-[15px] text-white/30 block mb-1 uppercase">Change Image</label>
            <input type="file" name="images" class="text-[15px] text-white/50 file:mr-4 file:py-1 file:px-2 file:border-0 file:bg-white/10 file:text-white">
        </div>

        <div class="flex gap-4 pt-4">
            <button type="submit" class="flex-1 py-3 bg-white text-black hover:bg-white/90 transition-colors font-bold uppercase text-xs">
                Update Post
            </button>
        </div>
    </form>
</div>
{% endblock %}
